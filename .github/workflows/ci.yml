name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository skeleton
        run: |
          test -f README.md
          test -f docker-compose.yml
          test -f apps/web/package.json
          test -f apps/api/package.json
          test -f workers/price-crawler/pyproject.toml
          test -f packages/shared-types/src/index.ts
